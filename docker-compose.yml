version: '3.8'

services:
  ollama-kie-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-kie-proxy
    ports:
      - "11434:11434"
    environment:
      - KIE_AI_API_KEY=${KIE_AI_API_KEY}
      - KIE_AI_API_URL=${KIE_AI_API_URL:-https://api.kie.ai/v1}
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=11434
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-opus-4-6}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
